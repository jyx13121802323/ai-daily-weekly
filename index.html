<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily & Weekly Reports</title>
    <style>
        :root {
            --color-success: #059669;
            --color-info: #2563EB;
            --color-bg: #F8FAFB;
            --color-text: #1C1917;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #059669, #2563EB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #ECFDF5, #EFF6FF);
            color: var(--color-info);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .section {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--color-success);
        }
        .report-list {
            list-style: none;
        }
        .report-list li {
            padding: 12px 0;
            border-bottom: 1px solid #E7E5E4;
        }
        .report-list li:last-child {
            border-bottom: none;
        }
        .report-list a {
            color: var(--color-info);
            text-decoration: none;
            font-weight: 500;
        }
        .report-list a:hover {
            color: var(--color-success);
        }
        .report-date {
            color: #78716C;
            font-size: 13px;
            margin-left: 10px;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #78716C;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="badge">🤖 AI 行业洞察</span>
            <h1>AI Daily & Weekly Reports</h1>
            <p>AI 技术日报 + 行业周报，自动追踪最新进展</p>
        </div>

        <div class="section">
            <h2>📰 最新日报</h2>
            <ul class="report-list" id="daily-list">
                <li><a href="daily-reports/2026-03/2026-03-10.md">AI 技术日报 - 2026-03-10</a><span class="report-date">今天</span></li>
            </ul>
        </div>

        <div class="section">
            <h2>📊 最新周报</h2>
            <ul class="report-list" id="weekly-list">
                <li>敬请期待...</li>
            </ul>
        </div>

        <div class="section">
            <h2>📁 归档</h2>
            <ul class="report-list">
                <li><a href="daily-reports/2026-03/">2026 年 3 月日报</a></li>
                <li><a href="weekly-reports/">2026 年周报</a></li>
            </ul>
        </div>

        <div class="footer">
            <p>Generated by OpenClaw AI Assistant</p>
            <p>参考项目：<a href="https://github.com/xiaoxiong20260206/ai-insight" target="_blank">AI-Insight</a></p>
        </div>
    </div>

    <script>
        // 自动加载最新报告
        fetch('daily-reports/2026-03/2026-03-10.md')
            .then(r => r.text())
            .then(content => {
                console.log('Latest report loaded');
            });
    </script>
</body>
</html>
